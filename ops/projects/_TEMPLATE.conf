# Template for a ci-deploy-shell project registry entry.
#
# Copy to <project-name>.conf, fill in the variables, then:
#   1. Install it: `sudo install -o root -g root -m 644 <name>.conf
#      /etc/ci-deploy/projects/` (same discipline as the wrapper script —
#      this repo's copy is the source of truth, the server copy is a
#      manual sync after every change).
#   2. Add ONE sudoers line scoped to this project's compose path(s) —
#      see ops/DEPLOY.md §6. `ops/new-project.sh` prints the exact line.
#   3. `app-up <project-name>` / `app-down <project-name>` /
#      `app-sync <project-name>` now work from ci-deploy-shell.sh.
#
# Every path below is relative to PROJECT_DIR — the wrapper joins them
# itself, never pass an absolute path or `../` here (harmless if you did:
# the resulting sudo command just wouldn't match the sudoers allowlist
# and would fail closed, but keep it clean).

# Absolute path on the server where this project's compose files + (if
# app-sync is used) synced files live. Must be owned by ci-deploy — the
# whole point of app-sync is writing here WITHOUT sudo.
PROJECT_DIR="/data/applications/<project-name>"

# One or more compose files, applied in order with repeated `-f` (the
# same override-layering rule as `docker compose` itself: later files
# override earlier ones). At least one required.
COMPOSE_FILES=("docker-compose.yml")

# Optional. Profiles activated on every `app-up`/`app-down` for this
# project (see docker-compose.yml's `profiles:` if it uses any). Leave
# empty `()` for a project with no profiles.
COMPOSE_PROFILES=()

# Optional. Env files passed with `--env-file` (which REPLACES Compose's
# default .env autoload, not adds to it — if your compose file needs
# vars from a real .env, list it here explicitly). Leave empty `()` if
# the project's compose file has no variable interpolation needing an
# explicit env file.
ENV_FILES=()

# Optional. Files `app-sync <project-name>` will accept via its tar.gz-
# over-stdin protocol — MUST be an exact allowlist (app-sync refuses the
# archive if it contains anything else, or is missing any of these).
# Leave empty `()` for a project that's deployed by other means (full
# rsync of source, a different CI mechanism, etc.) — app-sync will then
# refuse to run for this project, which is the safe default.
SYNC_FILES=()
