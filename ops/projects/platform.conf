# Registry entry for the shared platform stack itself (edge Caddy,
# cloudflared, Uptime Kuma). No profiles, no --env-file (compose.yaml
# has no interpolated vars needing one), no SYNC_FILES — Caddy vhost
# config is synced separately via ops/caddy/sync.sh, not through
# app-sync (different cadence: vhosts change per-onboarded-app, not per
# platform-stack deploy).
PROJECT_DIR="/data/applications/platform"
COMPOSE_FILES=("compose.yaml")
COMPOSE_PROFILES=()
ENV_FILES=()
SYNC_FILES=()
