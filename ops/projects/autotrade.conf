# Registry entry for autotrade_bot_app. Mirrors exactly what
# ci-deploy-shell.sh's autotrade-up/-down/-sync hardcoded before the
# generic app-* rework — same compose paths, same profiles, same env
# files, same sync allowlist, so the existing sudoers rule (scoped to
# these exact -f paths) keeps matching without any change.
PROJECT_DIR="/data/applications/autotrade"
COMPOSE_FILES=("docker-compose.yml" "docker-compose.bizshore01.yml")
COMPOSE_PROFILES=("auth" "observability")
ENV_FILES=(".env.production" "bizshore01.env")
SYNC_FILES=(
  "docker-compose.yml"
  "docker-compose.bizshore01.yml"
  "bizshore01.env"
  "deploy/pgbouncer/pgbouncer.ini"
  "deploy/pgbouncer/entrypoint.sh"
)
