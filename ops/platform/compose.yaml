services:
  caddy:
    image: caddy:2-alpine
    container_name: edge-caddy
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"

    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/apps:/etc/caddy/apps:ro
      - /data/static-sites:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config

    networks:
      - edge

    security_opt:
      - no-new-privileges:true

  cloudflared:
    # Pinned to 2026.7.1 — last stable date-based tag as of 2026-07-14
    # (5 days old at pin time, no newer release). Reproducible deploys
    # require a digest/literal tag, not :latest — :latest silently
    # jumps on container recreates and can break tunnel connectivity
    # if a release ships a behavior change in the connect flow. Bump
    # deliberately after smoke-testing the new tag; check the dashboard
    # of stable tags at
    # https://hub.docker.com/r/cloudflare/cloudflared/tags?page=1&ordering=last_updated
    # (the date-based line is what we pin; the commit-hash tags like
    # 1887-ecb88678f136 are an alternative for stricter reproducibility).
    image: cloudflare/cloudflared:2026.7.1
    container_name: cloudflared-tunnel
    restart: unless-stopped

    command: tunnel --no-autoupdate --protocol http2 run --token ${CLOUDFLARED_TOKEN}

    depends_on:
      - caddy

    networks:
      - edge

    security_opt:
      - no-new-privileges:true

  uptime-kuma:
    # Pinned to a specific patch, not :latest — same reproducibility
    # rationale as cloudflared above. Check for newer stable releases at
    # https://github.com/louislam/uptime-kuma/releases before bumping;
    # smoke-test (login still works, existing monitors survive) before
    # trusting a version bump in prod.
    image: louislam/uptime-kuma:1.23.16
    container_name: uptime-kuma
    restart: unless-stopped

    volumes:
      - uptime_kuma_data:/app/data

    networks:
      - edge

    security_opt:
      - no-new-privileges:true

    # Sin ports: — no publica al host. Llega por Cloudflare Tunnel como
    # cualquier app nueva del patron (ver ops/platform/README.md "Como
    # publicar una app nueva en este host"): ruta en el dashboard de
    # Cloudflare -> http://uptime-kuma:3001, sin TLS ni Origin Server
    # Name (Kuma sirve HTTP plano, el Tunnel termina TLS).
    #
    # El dashboard admin de Kuma tiene su propio login (se crea en el
    # primer acceso) — igual, recomendado poner el hostname detras de
    # una politica de Cloudflare Access (Zero Trust -> Access ->
    # Applications) para no depender solo de esa contrasena. Ver
    # ops/platform/README.md.

networks:
  edge:

volumes:
  caddy_data:
  caddy_config:
  uptime_kuma_data:
