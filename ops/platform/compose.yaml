services:
  caddy:
    image: caddy:2-alpine
    container_name: edge-caddy
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"

    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/apps:/etc/caddy/apps:ro
      - /data/static-sites:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config

    networks:
      - edge

    security_opt:
      - no-new-privileges:true

  cloudflared:
    # Pinned to 2026.7.1 — last stable date-based tag as of 2026-07-14
    # (5 days old at pin time, no newer release). Reproducible deploys
    # require a digest/literal tag, not :latest — :latest silently
    # jumps on container recreates and can break tunnel connectivity
    # if a release ships a behavior change in the connect flow. Bump
    # deliberately after smoke-testing the new tag; check the dashboard
    # of stable tags at
    # https://hub.docker.com/r/cloudflare/cloudflared/tags?page=1&ordering=last_updated
    # (the date-based line is what we pin; the commit-hash tags like
    # 1887-ecb88678f136 are an alternative for stricter reproducibility).
    image: cloudflare/cloudflared:2026.7.1
    container_name: cloudflared-tunnel
    restart: unless-stopped

    command: tunnel --no-autoupdate --protocol http2 run --token ${CLOUDFLARED_TOKEN}

    depends_on:
      - caddy

    networks:
      - edge

    security_opt:
      - no-new-privileges:true

networks:
  edge:

volumes:
  caddy_data:
  caddy_config:
